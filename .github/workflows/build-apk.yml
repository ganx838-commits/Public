name: web apk
on:
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: make apk
        uses: unnoobie/web2apk-action@main
        with:
          index_path: './index.html'
          app_name: test
          package_name: com.test.app
      - name: upload apk
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app-release.apk

