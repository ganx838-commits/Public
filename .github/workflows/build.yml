name: Build APK
on:
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Build Android Package
        run: pwabuilder ./ --platform android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name:摆摊计算器APK
          path: bld/android/*.apk
