name: 云端自动视频剪辑
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: Generate video
        run: |
          ffmpeg -f lavfi -i color=color=black:size=1080x1920:duration=10 -r 25 -c:v libx264 -pix_fmt yuv420p output.mp4 -y

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-file
          path: output.mp4
