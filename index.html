<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>摆摊计算器</title>
<style>
body{background:#f5f5f5;padding:15px;font-family:system-ui}
.wrap{background:#fff;padding:20px;border-radius:12px;max-width:550px;margin:0 auto}
p{margin:12px 0 4px}
input{width:100%;padding:11px;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{width:100%;margin-top:12px;padding:13px;background:#2563eb;color:white;border:none;border-radius:8px;font-size:16px}
#output{margin-top:15px;padding:15px;background:#eff6ff;border-radius:10px}
</style>
</head>
<body>
<div class="wrap">
<h2 style="text-align:center">摆摊利润计算器</h2>
<p>单件进货成本</p>
<input type="number" id="cost" step="0.01">
<p>售卖单价</p>
<input type="number" id="price" step="0.01">
<p>销售数量</p>
<input type="number" id="count">
<p>摆摊杂费</p>
<input type="number" id="other" value="0">
<button onclick="runCalc()">计算利润</button>
<div id="output"></div>
</div>
<script>
function runCalc(){
let c = Number(document.getElementById("cost").value)||0;
let p = Number(document.getElementById("price").value)||0;
let n = Number(document.getElementById("count").value)||0;
let o = Number(document.getElementById("other").value)||0;
let single = p - c;
let total = single * n;
let profit = total - o;
let text = `单件毛利：${single.toFixed(2)}元<br>总毛利：${total.toFixed(2)}元<br>开销：${o.toFixed(2)}元<br>`;
if(profit>0){
text += `<strong style="color:green">净利润：${profit.toFixed(2)}元</strong>`;
}else{
text += `<strong style="color:red">盈亏：${profit.toFixed(2)}元</strong>`;
}
document.getElementById("output").innerHTML = text;
}
</script>
</body>
</html>
