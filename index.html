<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摆摊综合利润计算器</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f5f5f5;padding:16px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px #00000012}
h2{color:#222;margin-bottom:14px;font-size:18px}
label{display:block;margin:10px 0 4px;color:#444}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{width:100%;padding:14px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:16px;margin-top:12px}
.btn-small{background:#666;margin-top:8px;padding:10px}
.result{margin-top:14px;padding:12px;background:#eff6ff;border-radius:8px}
.record-item{padding:10px;border-bottom:1px solid #eee}
</style>
</head>
<body>
<div class="card">
<h2>商品经营数据</h2>
<label>进货单价(元)</label>
<input type="number" id="cost" step="0.01" placeholder="输入成本">
<label>售卖单价(元)</label>
<input type="number" id="price" step="0.01" placeholder="售价">
<label>今日销量</label>
<input type="number" id="num" placeholder="卖出多少件">
<label>当日杂费(摊位/运费等)</label>
<input type="number" id="fee" step="0.01" value="0">
<button onclick="calc()">计算真实净利润</button>
<div class="result" id="res"></div>
</div>

<div class="card">
<h2>当日收支记录</h2>
<button onclick="saveRecord()">保存今日数据</button>
<button class="btn-small" onclick="showRecords()">查看历史记录</button>
<div id="recordList"></div>
</div>

<script>
function getRecords(){
  let str=localStorage.getItem("tradeData");
  return str?JSON.parse(str):[];
}
function calc(){
  let c=Number(document.getElementById("cost").value);
  let p=Number(document.getElementById("price").value);
  let n=Number(document.getElementById("num").value);
  let f=Number(document.getElementById("fee").value);
  if(!c||!p||!n){
    document.getElementById("res").innerText="请完整填写成本、售价、销量";
    return;
  }
  let profitOne=p-c;
  let totalProfit=profitOne*n-f;
  document.getElementById("res").innerHTML=`单件利润：${profitOne.toFixed(2)}元<br>扣除杂费总利润：${totalProfit.toFixed(2)}元`;
}
function saveRecord(){
  let c=Number(document.getElementById("cost").value);
  let p=Number(document.getElementById("price").value);
  let n=Number(document.getElementById("num").value);
  let f=Number(document.getElementById("fee").value);
  if(!c||!p||!n)return alert("先填写数据并计算");
  let profitOne=p-c;
  let totalProfit=profitOne*n-f;
  let arr=getRecords();
  arr.push({
    time:new Date().toLocaleDateString(),
    cost:c,price:p,num:n,fee:f,profit:totalProfit
  });
  localStorage.setItem("tradeData",JSON.stringify(arr));
  alert("今日记录保存成功");
}
function showRecords(){
  let arr=getRecords();
  let html="";
  arr.forEach(item=>{
    html+=`<div class="record-item">${item.time}｜利润 ${item.profit.toFixed(2)}元</div>`;
  });
  document.getElementById("recordList").innerHTML=html||"暂无记录";
}
</script>
</body>
</html>
